---
name: 🎮 Game Submission Proposal
description: Propose a new game to add to the platform
title: "[GAME] "
labels: ["🎮 game", "📝 proposal"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🎮 Game Submission Proposal
        Thank you for proposing a game! Please fill out the details below so we can review your idea.

  - type: input
    id: game-name
    attributes:
      label: Game Name
      description: What is the name of your game?
      placeholder: "e.g., Snake Game, Tic Tac Toe, Memory Match"
    validations:
      required: true

  - type: dropdown
    id: game-category
    attributes:
      label: Game Category
      description: What type of game is this?
      options:
        - CLI Game (Terminal-based)
        - Web Game (Browser-based)
        - Algorithm Game (Puzzle/Challenge)
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty Level
      description: How complex is this game?
      options:
        - Beginner
        - Intermediate
        - Advanced
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Programming Language
      description: What language will you use?
      options:
        - Python
        - JavaScript
        - HTML/CSS/JavaScript
        - TypeScript
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Game Description
      description: Describe your game in 2-3 sentences
      placeholder: "What does the game do? How does the player interact with it?"
    validations:
      required: true

  - type: textarea
    id: features
    attributes:
      label: Key Features
      description: List the main features of your game
      placeholder: |
        - Feature 1
        - Feature 2
        - Feature 3
    validations:
      required: true

  - type: checkboxes
    id: rules
    attributes:
      label: Submission Rules Confirmation
      description: Please confirm you understand the rules
      options:
        - label: My game is original or significantly modified from any tutorial
          required: true
        - label: My game does NOT make external API calls or network requests
          required: true
        - label: My game does NOT access the file system outside its directory
          required: true
        - label: My submission will have max 5 files and 500 lines of code
          required: true
        - label: I will include a README.md and metadata.json
          required: true
        - label: I have read the [Contributing Guide](../CONTRIBUTING.md)
          required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else you'd like to share? (screenshots, mockups, etc.)
      placeholder: Optional
