# ============================================================
# Welcome Bot: Auto-comment guidance on new PRs and Issues
# ============================================================
name: Welcome & Guide

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome-pr:
    name: Welcome PR Author
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check if first-time contributor
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;

            // Check if user has previous PRs
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              sort: 'created',
              direction: 'asc',
              per_page: 5,
            });

            const previousPRs = prs.filter(pr =>
              pr.user.login === author && pr.number !== context.payload.pull_request.number
            );

            core.setOutput('is_first_time', previousPRs.length === 0 ? 'true' : 'false');
            core.setOutput('author', author);
            core.setOutput('pr_count', previousPRs.length.toString());

      - name: Welcome first-time contributor
        if: steps.check.outputs.is_first_time == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const author = '${{ steps.check.outputs.author }}';

            const body = `## 🎉 Welcome @${author}!

            Thank you for your **first contribution** to Platform! We're excited to have you here.

            ### What happens next?

            1. 🤖 Our automated checks will validate your submission
            2. 📋 A maintainer will review your PR
            3. 💬 You may receive feedback — don't worry, it's part of the learning process!
            4. ✅ Once approved, your contribution will be merged

            ### Helpful Resources

            - 📖 [Contributing Guide](../CONTRIBUTING.md)
            - 📖 [Beginner's Guide](../docs/BEGINNER_GUIDE.md)
            - 💬 [Community Discussions](../../discussions)

            ### Tips for a Successful PR

            - ✅ Make sure all checkboxes in your PR template are checked
            - ✅ Respond to feedback promptly
            - ✅ Keep your code clean and well-commented
            - ✅ Ask questions if you're unsure about anything!

            ---
            *Every expert was once a beginner. You're doing great!* 🚀`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Welcome returning contributor
        if: steps.check.outputs.is_first_time == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const author = '${{ steps.check.outputs.author }}';
            const count = '${{ steps.check.outputs.pr_count }}';

            const body = `## 👋 Welcome back @${author}!

            Great to see you contributing again! This is your **PR #${parseInt(count) + 1}**.

            🤖 Automated checks are running now. A maintainer will review shortly.

            Keep up the great work! 🌟`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

  welcome-issue:
    name: Welcome Issue Author
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - name: Auto-respond to issue
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;
            const title = context.payload.issue.title;
            let body = '';

            if (title.startsWith('[GAME]')) {
              body = `## 🎮 Game Proposal Received!

              Thanks @${author} for proposing a game! Here's what to do next:

              1. Wait for a maintainer to approve your proposal
              2. Once approved, fork the repo and start coding
              3. Submit a PR using the **Game Submission** template
              4. Make sure to follow the [Submission Rules](../CONTRIBUTING.md#submission-rules)

              We'll review your proposal soon! 🕹️`;

            } else if (title.startsWith('[TRANSLATION]')) {
              body = `## 🌍 Translation Proposal Received!

              Thanks @${author} for offering to translate! Here's what to do next:

              1. Fork the repo and create a new branch
              2. Create your translation file following the naming convention
              3. Submit a PR using the **Translation** template
              4. Translation PRs can be auto-merged if all checks pass!

              Thank you for helping us reach a global audience! 🌐`;

            } else {
              body = `Thanks for opening this issue @${author}! A maintainer will look into it soon.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
