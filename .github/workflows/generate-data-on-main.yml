name: Regenerate Data On Main

on:
  workflow_dispatch:

jobs:
  regenerate-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild data
        run: npm run build:data

      - name: Commit regenerated data if changed
        env:
          GIT_USER_NAME: 'github-actions[bot]'
          GIT_USER_EMAIL: '41898282+github-actions[bot]@users.noreply.github.com'
        run: |
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"
          if [ -n "$(git status --porcelain)" ]; then
            git add data/games.json data/contributors.json data/leaderboard.json
            git commit -m "chore(data): regenerate generated data [skip ci]"
            git push
          else
            echo "No changes to generated data"
          fi
