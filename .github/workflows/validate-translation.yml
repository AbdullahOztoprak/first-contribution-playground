# ============================================================
# Validate Translation Submissions
# Checks structure, file naming, encoding
# ============================================================
name: Validate Translation

on:
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  validate-translation:
    name: Validate Translation Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate translation
        id: validate
        run: |
          set +e
          ERRORS=""

          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'translations/' 2>/dev/null)

          if [ -z "$FILES" ]; then
            echo "No translation files detected."
            echo "valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "=== Changed translation files ==="
          echo "$FILES"
          echo ""

          # ── 1. Check only markdown files ──
          INVALID_FILES=$(echo "$FILES" | grep -v "\.md$" | grep -v ".gitkeep")
          if [ -n "$INVALID_FILES" ]; then
            ERRORS="$ERRORS\n❌ **Only .md files are allowed in translations:**\n\`\`\`\n$INVALID_FILES\n\`\`\`\n"
          fi

          # ── 2. Check file naming convention (FILENAME.LANG_CODE.md) ──
          VALID_LANG_CODES="tr|es|fr|de|ja|zh-CN|zh-TW|pt-BR|ko|ar|hi|ru|it|nl|pl|sv|uk|vi|th|id"
          for f in $(echo "$FILES" | grep "\.md$" | grep -v ".gitkeep" | grep -v "^translations/README.md"); do
            BASENAME=$(basename "$f")
            if ! echo "$BASENAME" | grep -qE "\.($VALID_LANG_CODES)\.md$"; then
              ERRORS="$ERRORS\n❌ **Invalid file name \`$BASENAME\`** — must match pattern: \`FILENAME.LANG_CODE.md\`\nSupported codes: tr, es, fr, de, ja, zh-CN, pt-BR, ko, ar, hi, etc.\n"
            fi
          done

          # ── 3. Check UTF-8 encoding ──
          for f in $(echo "$FILES" | grep "\.md$"); do
            if [ -f "$f" ]; then
              ENCODING=$(file -bi "$f" | grep -oP 'charset=\K[^\s;]+')
              if [[ "$ENCODING" != "utf-8" && "$ENCODING" != "us-ascii" ]]; then
                ERRORS="$ERRORS\n❌ **File \`$f\` is not UTF-8 encoded** (detected: $ENCODING)\n"
              fi
            fi
          done

          # ── 4. Check file is not empty ──
          for f in $(echo "$FILES" | grep "\.md$"); do
            if [ -f "$f" ] && [ ! -s "$f" ]; then
              ERRORS="$ERRORS\n❌ **File \`$f\` is empty**\n"
            fi
          done

          # ── 5. Check minimum content length ──
          for f in $(echo "$FILES" | grep "\.md$"); do
            if [ -f "$f" ]; then
              LINES=$(wc -l < "$f" | tr -d ' ')
              if [ "$LINES" -lt 5 ]; then
                ERRORS="$ERRORS\n⚠️ **File \`$f\` has only $LINES lines** — translations should be substantial\n"
              fi
            fi
          done

          if [ -n "$ERRORS" ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            printf "$ERRORS" > /tmp/validation_errors.txt
          else
            echo "valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment validation results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const valid = '${{ steps.validate.outputs.valid }}' === 'true';

            let body = '';
            if (valid) {
              body = '## ✅ Translation Validation Passed\n\nYour translation meets all requirements!\n\nThis PR is eligible for **auto-merge** once all checks pass. 🎉';
            } else {
              body = '## ❌ Translation Validation Failed\n\nPlease fix the following issues:\n\n';
              try {
                body += fs.readFileSync('/tmp/validation_errors.txt', 'utf8').trim();
              } catch {
                body += 'Could not read error details.';
              }
              body += '\n\n---\n📖 See the [Contributing Guide](../CONTRIBUTING.md) for translation rules.';
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Translation Validation')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail if invalid
        if: steps.validate.outputs.valid == 'false'
        run: |
          echo "::error::Translation validation failed. See PR comments for details."
          exit 1
