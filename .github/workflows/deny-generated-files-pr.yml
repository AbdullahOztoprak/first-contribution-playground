name: Prevent Generated Data Changes in PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  deny-generated-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps (fast)
        run: npm ci --no-audit --no-fund

      - name: Check for generated data changes
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: npx tsx scripts/check-generated-changes.ts
