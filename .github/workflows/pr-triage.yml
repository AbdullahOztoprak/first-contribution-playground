# ============================================================
# PR Triage: Auto-detect submission type, apply labels, assign
# ============================================================
name: PR Triage & Auto-Label

on:
  pull_request:
    types: [opened, synchronize, edited]

permissions:
  pull-requests: write
  contents: read

jobs:
  triage:
    name: Detect & Label PR
    runs-on: ubuntu-latest
    outputs:
      pr_type: ${{ steps.detect.outputs.pr_type }}
      game_category: ${{ steps.detect.outputs.game_category }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect submission type
        id: detect
        run: |
          # Get list of changed files
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")

          # If the above fails (e.g., shallow clone), use GitHub API
          if [ -z "$FILES" ]; then
            FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null || echo "")
          fi

          echo "Changed files:"
          echo "$FILES"

          PR_TYPE="unknown"
          GAME_CATEGORY=""

          # Detect game submissions
          if echo "$FILES" | grep -q "^games/cli/"; then
            PR_TYPE="game"
            GAME_CATEGORY="cli"
          elif echo "$FILES" | grep -q "^games/web/"; then
            PR_TYPE="game"
            GAME_CATEGORY="web"
          elif echo "$FILES" | grep -q "^games/algorithm/"; then
            PR_TYPE="game"
            GAME_CATEGORY="algorithm"
          fi

          # Detect translations
          if echo "$FILES" | grep -q "^translations/"; then
            PR_TYPE="translation"
          fi

          echo "pr_type=$PR_TYPE" >> "$GITHUB_OUTPUT"
          echo "game_category=$GAME_CATEGORY" >> "$GITHUB_OUTPUT"
          echo "Detected PR type: $PR_TYPE (category: $GAME_CATEGORY)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const prType = '${{ steps.detect.outputs.pr_type }}';
            const gameCategory = '${{ steps.detect.outputs.game_category }}';
            const labels = [];

            if (prType === 'game') {
              labels.push('🎮 game');
              labels.push('🟢 beginner-friendly');
              if (gameCategory === 'cli') labels.push('💻 cli');
              if (gameCategory === 'web') labels.push('🌐 web');
              if (gameCategory === 'algorithm') labels.push('🧮 algorithm');
            } else if (prType === 'translation') {
              labels.push('🌍 translation');
              labels.push('🟢 beginner-friendly');
            } else {
              labels.push('❓ needs-triage');
            }

            // Create labels if they don't exist, then apply
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: prType === 'game' ? '6f42c1' : prType === 'translation' ? '0075ca' : 'e4e669',
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels,
            });

            console.log(`Applied labels: ${labels.join(', ')}`);
