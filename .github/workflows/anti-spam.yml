# ============================================================
# Anti-Spam: Rate-limit PRs and detect abuse patterns
# ============================================================
name: Anti-Spam Protection

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  anti-spam:
    name: Check for Spam Patterns
    runs-on: ubuntu-latest
    steps:
      - name: Analyze PR for spam
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const prTitle = context.payload.pull_request.title;
            const prBody = context.payload.pull_request.body || '';

            let isSpam = false;
            const reasons = [];

            // ── 1. Rate limiting: Max 3 PRs per day per author ──
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const { data: recentPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 100,
            });

            const authorPRsToday = recentPRs.filter(pr =>
              pr.user.login === author &&
              new Date(pr.created_at) >= new Date(since)
            );

            if (authorPRsToday.length > 3) {
              isSpam = true;
              reasons.push(`🚫 Rate limit exceeded: ${authorPRsToday.length} PRs in the last 24 hours (max 3)`);
            }

            // ── 2. Empty PR check ──
            if (prBody.length < 20) {
              reasons.push('⚠️ PR description is too short (less than 20 characters)');
            }

            // ── 3. Account age check ──
            const { data: user } = await github.rest.users.getByUsername({
              username: author,
            });
            const accountAge = (Date.now() - new Date(user.created_at).getTime()) / (1000 * 60 * 60 * 24);

            if (accountAge < 7) {
              reasons.push(`⚠️ Account is less than 7 days old (${Math.floor(accountAge)} days)`);
            }

            // ── 4. Duplicate content check ──
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            if (files.length === 0) {
              isSpam = true;
              reasons.push('🚫 PR has no file changes');
            }

            // ── 5. Suspicious patterns in title ──
            const spamPatterns = /test\d*$|asdf|qwerty|xxx|spam|hack|free money/i;
            if (spamPatterns.test(prTitle)) {
              reasons.push('⚠️ PR title matches a suspicious pattern');
            }

            // ── Take action ──
            if (isSpam) {
              // Close the PR
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                state: 'closed',
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `## 🚫 PR Automatically Closed\n\nThis PR was flagged as potential spam and has been automatically closed.\n\n**Reasons:**\n${reasons.map(r => `- ${r}`).join('\n')}\n\nIf this is a mistake, please contact a maintainer to reopen it.`,
              });

              // Add spam label
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: '🚫 spam',
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: '🚫 spam',
                  color: 'b60205',
                });
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['🚫 spam'],
              });

            } else if (reasons.length > 0) {
              // Just warn, don't close
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `## ⚠️ Automated Review Notes\n\n${reasons.map(r => `- ${r}`).join('\n')}\n\nThese are non-blocking warnings. A maintainer will review.`,
              });
            }
