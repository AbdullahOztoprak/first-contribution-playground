# ============================================================
# Security Scan: Deep security analysis for game submissions
# ============================================================
name: Security Scan

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'games/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deep security scan
        id: security
        run: |
          set +e
          ISSUES=""
          SEVERITY="safe"

          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'games/' 2>/dev/null)
          
          if [ -z "$FILES" ]; then
            echo "severity=safe" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "=== Security Scan ==="

          for f in $(echo "$FILES" | grep -E "\.(py|js)$"); do
            if [ ! -f "$f" ]; then continue; fi

            echo "Scanning: $f"

            # ── Critical: System command execution ──
            if grep -nE "(os\.system|subprocess\.|os\.popen|commands\.)" "$f" 2>/dev/null; then
              ISSUES="$ISSUES\n🔴 **CRITICAL** — System command execution in \`$f\`\n"
              SEVERITY="critical"
            fi

            # ── Critical: Code execution ──
            if grep -nE "(exec\(|eval\(|compile\(|__import__)" "$f" 2>/dev/null; then
              ISSUES="$ISSUES\n🔴 **CRITICAL** — Dynamic code execution in \`$f\`\n"
              SEVERITY="critical"
            fi

            # ── Critical: Network access ──
            if grep -nE "(import requests|import urllib|import http\.client|import socket|import aiohttp)" "$f" 2>/dev/null; then
              ISSUES="$ISSUES\n🔴 **CRITICAL** — Network library import in \`$f\`\n"
              SEVERITY="critical"
            fi

            if grep -nE "(fetch\(|XMLHttpRequest|WebSocket|\.ajax\(|axios)" "$f" 2>/dev/null; then
              ISSUES="$ISSUES\n🟠 **HIGH** — Network request in \`$f\`\n"
              [ "$SEVERITY" != "critical" ] && SEVERITY="high"
            fi

            # ── High: File system access ──
            if grep -nE "(os\.remove|os\.unlink|shutil\.rmtree|os\.makedirs|pathlib\.Path)" "$f" 2>/dev/null; then
              ISSUES="$ISSUES\n🟠 **HIGH** — File system modification in \`$f\`\n"
              [ "$SEVERITY" != "critical" ] && SEVERITY="high"
            fi

            # ── Medium: Sensitive data access ──
            if grep -nE "(document\.cookie|localStorage|sessionStorage|IndexedDB)" "$f" 2>/dev/null; then
              ISSUES="$ISSUES\n🟡 **MEDIUM** — Browser storage access in \`$f\`\n"
              [ "$SEVERITY" = "safe" ] && SEVERITY="medium"
            fi

            # ── Medium: Encoded/obfuscated content ──
            if grep -nE "(base64|atob\(|btoa\(|\\\\x[0-9a-fA-F]{2})" "$f" 2>/dev/null; then
              ISSUES="$ISSUES\n🟡 **MEDIUM** — Encoded content detected in \`$f\`\n"
              [ "$SEVERITY" = "safe" ] && SEVERITY="medium"
            fi

            # ── Info: External script loading ──
            if grep -nE "(script src=|<iframe|<embed|<object)" "$f" 2>/dev/null; then
              ISSUES="$ISSUES\n🔵 **INFO** — External resource loading in \`$f\`\n"
            fi
          done

          # Check HTML files for script injections
          for f in $(echo "$FILES" | grep -E "\.html$"); do
            if [ ! -f "$f" ]; then continue; fi
            if grep -nE "(on[a-z]+=|javascript:|<script.*src=)" "$f" 2>/dev/null; then
              ISSUES="$ISSUES\n🟡 **MEDIUM** — Inline event handlers or external scripts in \`$f\`\n"
              [ "$SEVERITY" = "safe" ] && SEVERITY="medium"
            fi
          done

          echo "severity=$SEVERITY" >> "$GITHUB_OUTPUT"
          if [ -n "$ISSUES" ]; then
            printf "$ISSUES" > /tmp/security_issues.txt
          fi

          echo "Security severity: $SEVERITY"

      - name: Report security findings
        if: steps.security.outputs.severity != 'safe'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const severity = '${{ steps.security.outputs.severity }}';

            let body = `## 🔒 Security Scan Results\n\n**Severity:** `;

            if (severity === 'critical') {
              body += '🔴 CRITICAL\n\n';
            } else if (severity === 'high') {
              body += '🟠 HIGH\n\n';
            } else {
              body += '🟡 MEDIUM\n\n';
            }

            try {
              body += fs.readFileSync('/tmp/security_issues.txt', 'utf8');
            } catch {}

            body += '\n\n---\n';

            if (severity === 'critical' || severity === 'high') {
              body += '⛔ **This PR requires manual security review before merging.**\n';
              body += 'A maintainer will review the flagged code sections.';
            } else {
              body += '⚠️ A maintainer will review these findings during the normal review process.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Apply security label
        if: steps.security.outputs.severity == 'critical' || steps.security.outputs.severity == 'high'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: '🔒 needs-security-review',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: '🔒 needs-security-review',
                color: 'b60205',
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['🔒 needs-security-review'],
            });

      - name: Fail on critical severity
        if: steps.security.outputs.severity == 'critical'
        run: |
          echo "::error::Critical security issues detected. This PR cannot be merged."
          exit 1
