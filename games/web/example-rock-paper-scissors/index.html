<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🪨 📄 ✂️ Rock Paper Scissors</h1>
        <p class="subtitle">Choose your weapon!</p>

        <div class="choices">
            <button class="choice-btn" data-choice="rock" onclick="play('rock')">🪨<br>Rock</button>
            <button class="choice-btn" data-choice="paper" onclick="play('paper')">📄<br>Paper</button>
            <button class="choice-btn" data-choice="scissors" onclick="play('scissors')">✂️<br>Scissors</button>
        </div>

        <div class="result" id="result"></div>

        <div class="scoreboard">
            <span>You: <strong id="player-score">0</strong></span>
            <span>Computer: <strong id="computer-score">0</strong></span>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Game</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
